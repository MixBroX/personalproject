<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>С днём рождения, мама!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Основные стили для блокировки интерфейса */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* Обновленный градиент с поддержкой Safari */
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffd1ff, #a1c4fd);
            background-size: 400% 400%;
            
            /* Анимация с вендорными префиксами */
            -webkit-animation: gradientBG 15s ease infinite;
            animation: gradientBG 15s ease infinite;
            
            /* Оптимизация для мобильных браузеров */
            will-change: background-position;
            -webkit-tap-highlight-color: transparent;
        }

        /* Анимация перелива фона */
        @-webkit-keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .content-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 85%;
            max-width: 380px;
            position: relative;
            z-index: 10;
            touch-action: auto;
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 2.8rem;
            color: #c2185b;
            margin: 1rem 0;
            line-height: 1.1;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        /* Свечи */
        .candle {
            position: absolute;
            bottom: 80px;
            width: 25px;
            height: 70px;
        }

        .candle.left { left: -10px; transform: rotate(-10deg); }
        .candle.right { right: -10px; transform: rotate(10deg); }

        .flame {
            width: 12px;
            height: 20px;
            background: #ff9800;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -15px;
            left: 6px;
            animation: flicker 0.1s infinite alternate;
            box-shadow: 0 0 10px #ffeb3b, 0 0 20px #ff9800;
        }

        @keyframes flicker {
            0% { transform: scale(1) skewX(2deg); }
            100% { transform: scale(1.1) skewX(-2deg); }
        }

        .candle-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #ff80ab, #f48fb1);
            border-radius: 5px;
        }

        /* Кнопки */
        .controls {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
            gap: 2rem;
        }

        .btn-action {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            transition: transform 0.1s;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }

        .btn-action:active {
            transform: scale(0.85);
        }

        .btn-balloon {
            background: radial-gradient(circle at 35% 35%, #ff5e62, #ff9966);
            position: relative;
        }

        .btn-popper {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            border-radius: 20px;
        }

        /* Анимация шаров */
        .floating-balloon {
            position: absolute;
            bottom: -100px;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(15deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="content-card">
        <!-- Свечи -->
        <div class="candle left">
            <div class="flame"></div>
            <div class="candle-body"></div>
        </div>
        <div class="candle right">
            <div class="flame"></div>
            <div class="candle-body"></div>
        </div>

        <h1>С днём рождения, мама!</h1>
        <p class="text-pink-700 font-semibold mb-4">Самой любимой и дорогой ❤️</p>

        <div class="controls">
            <!-- Кнопка Шарик -->
            <button onclick="spawnBalloons()" class="btn-action btn-balloon">
                🎈
            </button>
            
            <!-- Кнопка Хлопушка -->
            <button onclick="fireConfetti()" class="btn-action btn-popper">
                🎉
            </button>
        </div>
    </div>

    <script>
        // Предотвращаем любые жесты Safari
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (e.target.closest('.content-card')) return;
            e.preventDefault();
        }, { passive: false });

        let lastTap = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTap <= 300) e.preventDefault();
            lastTap = now;
        }, false);

        // Функция конфетти
        function fireConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.7 },
                colors: ['#ff0a54', '#ff477e', '#ff7096', '#ff85a1', '#fbb1bd']
            });
        }

        // Функция появления шариков
        function spawnBalloons() {
            const colors = ['#FF5E62', '#FF9966', '#a1c4fd', '#c2e9fb', '#fbc2eb'];
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const balloon = document.createElement('div');
                    balloon.className = 'floating-balloon';
                    const size = Math.random() * 30 + 40;
                    const left = Math.random() * 90 + 5;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const duration = Math.random() * 2 + 3;

                    balloon.innerHTML = `
                        <svg width="${size}" height="${size * 1.3}" viewBox="0 0 30 40">
                            <path d="M15 0 C23 0 30 7 30 15 C30 23 23 30 15 30 C7 30 0 23 0 15 C0 7 7 0 15 0" fill="${color}" />
                            <path d="M15 30 L13 35 L17 35 Z" fill="${color}" />
                            <path d="M15 35 Q15 40 18 40" stroke="rgba(0,0,0,0.2)" fill="none" stroke-width="1" />
                        </svg>
                    `;
                    
                    balloon.style.left = left + 'vw';
                    balloon.style.animation = `floatUp ${duration}s ease-in forwards`;
                    
                    document.body.appendChild(balloon);
                    setTimeout(() => balloon.remove(), duration * 1000);
                }, i * 100);
            }
        }

        // Автозапуск при входе
        window.onload = () => {
            setTimeout(fireConfetti, 800);
        };
    </script>
</body>
</html>
