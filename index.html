<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>С днём рождения, мама!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Блокировка скролла и жестов */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            /* Пастельный желтый фон */
            background-color: #fff9c4; 
        }

        body {
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: 90%;
            max-width: 400px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 2.5rem;
            color: #d81b60;
            margin: 1rem 0;
            line-height: 1.2;
        }

        #compliment-text {
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }

        /* Свечи */
        .candle {
            position: absolute;
            bottom: 60px;
            width: 30px;
            height: 80px;
        }
        .candle.left { left: -15px; transform: rotate(-5deg); }
        .candle.right { right: -15px; transform: rotate(5deg); }

        .flame {
            width: 12px;
            height: 20px;
            background: #ff9800;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -15px;
            left: 9px;
            animation: flicker 0.1s infinite alternate;
            box-shadow: 0 0 10px #ffeb3b, 0 0 20px #ff9800;
        }

        @keyframes flicker {
            0% { transform: scale(1) skewX(2deg); opacity: 0.9; }
            100% { transform: scale(1.1) skewX(-2deg); opacity: 1; }
        }

        .candle-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #ff80ab, #f06292);
            border-radius: 4px;
            border-bottom: 2px solid #880e4f;
        }

        /* Кнопки */
        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            gap: 0.5rem;
        }

        .btn-action {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            color: white;
        }

        .btn-action:active {
            transform: scale(0.9);
        }

        .btn-balloon { background: #ff5252; }
        .btn-popper { background: #7e57c2; border-radius: 15px; }
        .btn-compliment { background: #00bcd4; }

        .floating-balloon {
            position: absolute;
            bottom: -100px;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="content-card">
        <div class="candle left">
            <div class="flame"></div>
            <div class="candle-body"></div>
        </div>
        <div class="candle right">
            <div class="flame"></div>
            <div class="candle-body"></div>
        </div>

        <h1>С днём рождения, мама!</h1>
        <div id="compliment-text">
            <p class="text-pink-600 font-medium">Ты самая лучшая в мире! ❤️</p>
        </div>

        <div class="controls">
            <!-- Кнопка Шарик -->
            <button onclick="spawnBalloons()" class="btn-action btn-balloon" title="Шарики">🎈</button>
            
            <!-- Кнопка Комплимент -->
            <button onclick="nextCompliment()" class="btn-action btn-compliment" title="Комплимент">🎁</button>

            <!-- Кнопка Хлопушка -->
            <button onclick="fireConfetti()" class="btn-action btn-popper" title="Конфетти">🎉</button>
        </div>
    </div>

    <script>
        const compliments = [
            "Ты самая лучшая в мире! ❤️",
            "Ты самая добрая и нежная! ✨",
            "Спасибо за твою теплоту! 🌸",
            "Ты сияешь ярче всех звезд! 🌟",
            "Ты самая красивая мама на свете! 🌹",
            "Пусть каждый день будет сказкой! 🏰",
        ];
        
        let currentIdx = 0;

        function nextCompliment() {
            const textElement = document.getElementById('compliment-text');
            textElement.style.opacity = 0;
            
            setTimeout(() => {
                currentIdx = (currentIdx + 1) % compliments.length;
                textElement.innerHTML = `<p class="text-pink-600 font-medium">${compliments[currentIdx]}</p>`;
                textElement.style.opacity = 1;
            }, 300);
        }

        // Блокировка Safari жестов
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (!e.target.closest('.btn-action')) e.preventDefault();
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);

        function fireConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.8 },
                colors: ['#ff80ab', '#ffeb3b', '#00bcd4', '#7e57c2']
            });
        }

        function spawnBalloons() {
            const colors = ['#ff5252', '#40c4ff', '#ffeb3b', '#69f0ae', '#e040fb'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const balloon = document.createElement('div');
                    balloon.className = 'floating-balloon';
                    const size = Math.random() * 20 + 30;
                    const left = Math.random() * 90 + 5;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const duration = Math.random() * 2 + 3;

                    balloon.innerHTML = `
                        <svg width="${size}" height="${size * 1.2}" viewBox="0 0 30 40">
                            <path d="M15 0 C23 0 30 7 30 15 C30 23 23 30 15 30 C7 30 0 23 0 15 C0 7 7 0 15 0" fill="${color}" />
                            <path d="M15 30 L13 35 L17 35 Z" fill="${color}" />
                        </svg>
                    `;
                    
                    balloon.style.left = left + 'vw';
                    balloon.style.animation = `floatUp ${duration}s linear forwards`;
                    
                    document.body.appendChild(balloon);
                    setTimeout(() => balloon.remove(), duration * 1000);
                }, i * 150);
            }
        }

        window.onload = () => {
            setTimeout(fireConfetti, 500);
        };
    </script>
</body>
</html>
