<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>С днём рождения, мама!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Полная блокировка скролла и зума */
        :root {
            --bg-color-1: #ffdee9;
            --bg-color-2: #b5fffc;
            --bg-color-3: #fbc2eb;
            --bg-color-4: #e0c3fc;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed; /* Фиксируем всё окно */
            touch-action: none; /* Отключаем жесты на уровне браузера */
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, var(--bg-color-1), var(--bg-color-2), var(--bg-color-3), var(--bg-color-4));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .content-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 90%;
            max-width: 400px;
            position: relative;
            z-index: 10;
            /* Разрешаем клики только по элементам управления */
            touch-action: auto; 
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 2.5rem;
            color: #d81b60;
            margin: 1rem 0;
            line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
        }

        .candle {
            position: absolute;
            bottom: 60px;
            width: 30px;
            height: 80px;
        }

        .candle.left { left: -15px; transform: rotate(-5deg); }
        .candle.right { right: -15px; transform: rotate(5deg); }

        .flame {
            width: 12px;
            height: 20px;
            background: #ff9800;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -15px;
            left: 9px;
            animation: flicker 0.1s infinite alternate;
            box-shadow: 0 0 10px #ffeb3b, 0 0 20px #ff9800;
        }

        @keyframes flicker {
            0% { transform: scale(1) skewX(2deg); opacity: 0.9; }
            100% { transform: scale(1.1) skewX(-2deg); opacity: 1; }
        }

        .candle-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #ff80ab, #f06292);
            border-radius: 4px;
            border-bottom: 2px solid #880e4f;
        }

        .controls {
            display: flex;
            justify-content: space-around;
            margin-top: 2rem;
            gap: 1rem;
        }

        .btn-action {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background: white;
            z-index: 20;
        }

        .btn-action:active {
            transform: scale(0.9);
        }

        .btn-balloon {
            background: radial-gradient(circle at 30% 30%, #ff5252, #b71c1c);
            position: relative;
        }
        .btn-balloon::after {
            content: '';
            position: absolute;
            bottom: -5px;
            width: 2px;
            height: 15px;
            background: rgba(0,0,0,0.2);
            left: 50%;
        }

        .btn-popper {
            background: linear-gradient(135deg, #7e57c2, #4527a0);
            border-radius: 15px;
        }

        .floating-balloon {
            position: absolute;
            bottom: -100px;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="content-card">
        <div class="candle left">
            <div class="flame"></div>
            <div class="candle-body"></div>
        </div>
        <div class="candle right">
            <div class="flame"></div>
            <div class="candle-body"></div>
        </div>

        <h1>С днём рождения, мама!</h1>
        <p class="text-pink-600 font-medium">Ты самая лучшая в мире!</p>

        <div class="controls">
            <button onclick="spawnBalloons()" class="btn-action btn-balloon">🎈</button>
            <button onclick="fireConfetti()" class="btn-action btn-popper">🎉</button>
        </div>
    </div>

    <script>
        // JS блокировка зума и свайпов для iOS Safari
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            // Разрешаем касания только если это кнопки, остальное блокируем
            if (!e.target.closest('.btn-action')) {
                e.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault(); // Блокировка двойного тапа (зум)
            }
            lastTouchEnd = now;
        }, false);

        function fireConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.8 },
                colors: ['#ff80ab', '#ff4081', '#fbc2eb', '#b5fffc']
            });
        }

        function spawnBalloons() {
            const colors = ['#ff5252', '#40c4ff', '#ffeb3b', '#69f0ae', '#e040fb'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const balloon = document.createElement('div');
                    balloon.className = 'floating-balloon';
                    const size = Math.random() * 30 + 30;
                    const left = Math.random() * 90 + 5;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const duration = Math.random() * 3 + 3;

                    balloon.innerHTML = `
                        <svg width="${size}" height="${size * 1.2}" viewBox="0 0 30 40">
                            <path d="M15 0 C23 0 30 7 30 15 C30 23 23 30 15 30 C7 30 0 23 0 15 C0 7 7 0 15 0" fill="${color}" />
                            <path d="M15 30 L13 35 L17 35 Z" fill="${color}" />
                        </svg>
                    `;
                    
                    balloon.style.left = left + 'vw';
                    balloon.style.animation = `floatUp ${duration}s linear forwards`;
                    
                    document.body.appendChild(balloon);
                    setTimeout(() => balloon.remove(), duration * 1000);
                }, i * 150);
            }
        }

        window.onload = () => {
            setTimeout(fireConfetti, 500);
        };
    </script>
</body>
</html>
